<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <title>Finance Family</title>
    <meta name="description" content="Gestão financeira pessoal e familiar" />
    <meta name="author" content="Finance Family" />

    <meta property="og:title" content="Finance Family" />
    <meta property="og:description" content="Gestão financeira pessoal e familiar" />
    <meta property="og:type" content="website" />

    <script>
      (function () {
        try {
          var t = localStorage.getItem("finance-family-theme");
          if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
